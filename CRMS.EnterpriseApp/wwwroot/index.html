<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRMS Enterprise — Staff Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --gold: #f0b429;
            --dark: #080808;
            --card: #111;
            --border: #222;
            --sidebar: 160px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Inter',sans-serif;
            min-height: 100vh;
            display: flex;
        }

        h1, h2, h3, h4 {
            font-family: 'Rajdhani',sans-serif;
            letter-spacing: 1px;
        }

        .hidden {
            display: none !important;
        }

        .login-wrap {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
        }

        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
        }

            .login-box h1 {
                font-size: 2.5rem;
                color: var(--gold);
                margin-bottom: 4px;
            }

            .login-box p {
                color: #666;
                margin-bottom: 32px;
                font-size: 0.9rem;
            }

        .form-group {
            margin-bottom: 16px;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                font-size: 0.8rem;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .form-group input {
                width: 100%;
                background: #0a0a0a;
                border: 1px solid var(--border);
                color: #fff;
                padding: 12px;
                border-radius: 8px;
                font-size: 1rem;
                font-family: 'Inter',sans-serif;
            }

                .form-group input:focus {
                    outline: none;
                    border-color: var(--gold);
                }

        .btn-gold {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Rajdhani',sans-serif;
            letter-spacing: 1px;
            margin-top: 8px;
        }

            .btn-gold:hover {
                opacity: 0.9;
            }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .alert-error {
            background: #1a0000;
            border: 1px solid #600;
            color: #f88;
        }

        .alert-success {
            background: #001a00;
            border: 1px solid #060;
            color: #8f8;
        }

        .sidebar {
            width: var(--sidebar);
            background: #0a0a0a;
            border-right: 1px solid var(--border);
            min-height: 100vh;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
        }

            .sidebar .logo {
                padding: 0 16px 24px;
                border-bottom: 1px solid var(--border);
                margin-bottom: 16px;
            }

                .sidebar .logo h2 {
                    font-size: 1.3rem;
                    color: var(--gold);
                }

                .sidebar .logo p {
                    font-size: 0.7rem;
                    color: #666;
                }

        .nav-item {
            padding: 12px 16px;
            cursor: pointer;
            color: #888;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid transparent;
        }

            .nav-item:hover {
                color: #fff;
                background: #111;
            }

            .nav-item.active {
                color: var(--gold);
                border-left-color: var(--gold);
                background: #111;
            }

            .nav-item .icon {
                font-size: 1.1rem;
            }

        .sidebar-bottom {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
        }

            .user-info span {
                color: var(--gold);
                display: block;
                font-weight: 600;
            }

        .btn-logout {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #333;
            color: #888;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

            .btn-logout:hover {
                border-color: var(--gold);
                color: var(--gold);
            }

        .main {
            margin-left: var(--sidebar);
            flex: 1;
            padding: 32px;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 24px;
            color: #fff;
        }

            .page-title span {
                color: var(--gold);
            }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

            .stat-card .label {
                font-size: 0.75rem;
                color: #666;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 8px;
            }

            .stat-card .value {
                font-size: 2rem;
                font-family: 'Rajdhani',sans-serif;
                color: var(--gold);
            }

        .table-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0a0a0a;
            padding: 12px 16px;
            text-align: left;
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #0f0f0f;
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #0f0f0f;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-Pending {
            background: #2a2500;
            color: var(--gold);
        }

        .status-Approved {
            background: #002a00;
            color: #4caf50;
        }

        .status-Active {
            background: #00152a;
            color: #2196f3;
        }

        .status-Completed {
            background: #1a1a1a;
            color: #666;
        }

        .status-Cancelled {
            background: #1a0000;
            color: #f44;
        }

        .status-Rejected {
            background: #1a0000;
            color: #f44;
        }

        .btn-approve {
            padding: 6px 12px;
            background: #002a00;
            border: 1px solid #060;
            color: #4f4;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 4px;
        }

        .btn-reject {
            padding: 6px 12px;
            background: #1a0000;
            border: 1px solid #600;
            color: #f44;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 4px;
        }

        .btn-complete {
            padding: 6px 12px;
            background: #00152a;
            border: 1px solid #036;
            color: #4af;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-edit {
            padding: 6px 12px;
            background: #1a1500;
            border: 1px solid #640;
            color: var(--gold);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 4px;
        }

        .btn-delete {
            padding: 6px 12px;
            background: #1a0000;
            border: 1px solid #600;
            color: #f44;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-add {
            padding: 10px 20px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Rajdhani',sans-serif;
            margin-bottom: 16px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

            .modal h3 {
                font-size: 1.8rem;
                margin-bottom: 24px;
                color: var(--gold);
            }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

            .modal-actions button {
                flex: 1;
                padding: 12px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 700;
                font-family: 'Rajdhani',sans-serif;
            }

        .btn-cancel-modal {
            background: transparent;
            border: 1px solid #333;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="loginWrap" class="login-wrap">
        <div class="login-box">
            <h1>CRMS</h1>
            <p>Enterprise Staff Portal</p>
            <div id="loginAlert"></div>
            <div class="form-group"><label>Username</label><input id="loginUser" placeholder="Staff or Admin username" /></div>
            <div class="form-group"><label>Password</label><input id="loginPass" type="password" placeholder="Password" /></div>
            <button class="btn-gold" onclick="login()">ACCESS PORTAL</button>
        </div>
    </div>

    <div id="dashboard" class="hidden" style="display:flex;width:100%">
        <div class="sidebar">
            <div class="logo"><h2>CRMS</h2><p>Enterprise</p></div>
            <div class="nav-item active" onclick="showSection('bookings')" id="nav-bookings">
                <span class="icon">📋</span> Bookings
            </div>
            <div class="nav-item hidden" onclick="showSection('cars')" id="nav-cars">
                <span class="icon">🚗</span> Cars
            </div>
            <div class="nav-item hidden" onclick="showSection('users')" id="nav-users">
                <span class="icon">👥</span> Users
            </div>
            <div class="sidebar-bottom">
                <div class="user-info">Logged in as<span id="sidebarUser"></span></div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="main">
            <div id="bookingsSection">
                <div class="page-title">All <span>Bookings</span></div>
                <div class="stats-grid" id="statsGrid"></div>
                <div id="bookingsAlert"></div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Customer</th><th>Car</th><th>Pickup</th><th>Return</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="bookingsTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="carsSection" class="hidden">
                <div class="page-title">Fleet <span>Management</span></div>
                <button class="btn-add" onclick="openCarModal()">+ Add New Car</button>
                <div id="carsAlert"></div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Make</th><th>Model</th><th>Year</th><th>Category</th><th>Daily Rate</th><th>Plate</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="carsTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="usersSection" class="hidden">
                <div class="page-title">Registered <span>Users</span></div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>ID</th><th>Username</th><th>Full Name</th><th>Role</th><th>Email</th><th>Phone</th><th>Joined</th></tr></thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="carModal">
        <div class="modal">
            <h3 id="carModalTitle">Add New Car</h3>
            <div id="carModalAlert"></div>
            <div class="form-group"><label>Make</label><input id="carMake" placeholder="e.g. Toyota" /></div>
            <div class="form-group"><label>Model</label><input id="carModel" placeholder="e.g. Camry" /></div>
            <div class="form-group"><label>Year</label><input id="carYear" type="number" placeholder="e.g. 2023" /></div>
            <div class="form-group"><label>Category</label><input id="carCategory" placeholder="e.g. Sedan, SUV, Van" /></div>
            <div class="form-group"><label>Daily Rate ($)</label><input id="carRate" type="number" placeholder="e.g. 55" /></div>
            <div class="form-group"><label>Licence Plate</label><input id="carPlate" placeholder="e.g. ABC-123" /></div>
            <div class="form-group"><label>Colour</label><input id="carColour" placeholder="e.g. White" /></div>
            <div class="modal-actions">
                <button class="btn-cancel-modal" onclick="closeCarModal()">Cancel</button>
                <button class="btn-gold" style="width:auto;padding:12px 24px" onclick="saveCar()">Save Car</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://toni-crms.runasp.net';
        let currentRole = null;
        let editingCarId = null;

        function authHeader() {
            return 'Basic ' + btoa(localStorage.getItem('ent_user') + ':' + localStorage.getItem('ent_pass'));
        }

        function showAlert(id, msg, type = 'error') {
            document.getElementById(id).innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => { document.getElementById(id).innerHTML = ''; }, 4000);
        }

        async function login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            if (!u || !p) return showAlert('loginAlert', 'Please enter credentials');
            localStorage.setItem('ent_user', u);
            localStorage.setItem('ent_pass', p);
            try {
                const res = await fetch(`${API}/bookings`, { headers: { Authorization: authHeader() } });
                if (res.status === 401) { showAlert('loginAlert', 'Invalid credentials'); return; }
                if (res.status === 403) { showAlert('loginAlert', 'Access denied. Staff or Admin only.'); return; }

                let isAdmin = false;
                try {
                    const userRes = await fetch(`${API}/users`, { headers: { Authorization: authHeader() } });
                    isAdmin = userRes.ok;
                } catch (e) { isAdmin = false; }

                currentRole = isAdmin ? 'Admin' : 'Staff';
                document.getElementById('sidebarUser').textContent = u + ' (' + currentRole + ')';

                if (currentRole === 'Admin') {
                    document.getElementById('nav-cars').classList.remove('hidden');
                    document.getElementById('nav-users').classList.remove('hidden');
                }

                document.getElementById('loginWrap').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadBookings();
            } catch (e) { showAlert('loginAlert', 'Connection error.'); }
        }

        function showSection(section) {
            ['bookings', 'cars', 'users'].forEach(s => {
                document.getElementById(s + 'Section').classList.add('hidden');
                document.getElementById('nav-' + s).classList.remove('active');
            });
            document.getElementById(section + 'Section').classList.remove('hidden');
            document.getElementById('nav-' + section).classList.add('active');
            if (section === 'bookings') loadBookings();
            if (section === 'cars') loadCars();
            if (section === 'users') loadUsers();
        }

        async function loadBookings() {
            try {
                const res = await fetch(`${API}/bookings`, { headers: { Authorization: authHeader() } });
                const bookings = await res.json();
                const pending = bookings.filter(b => b.status === 'Pending').length;
                const active = bookings.filter(b => b.status === 'Active').length;
                const total = bookings.reduce((s, b) => s + b.totalAmount, 0);
                document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card"><div class="label">Total Bookings</div><div class="value">${bookings.length}</div></div>
          <div class="stat-card"><div class="label">Pending</div><div class="value">${pending}</div></div>
          <div class="stat-card"><div class="label">Active</div><div class="value">${active}</div></div>
          <div class="stat-card"><div class="label">Revenue</div><div class="value">$${total.toFixed(0)}</div></div>`;
                document.getElementById('bookingsTable').innerHTML = bookings.map(b => `
          <tr>
            <td>${b.customerName}</td>
            <td>${b.car}</td>
            <td>${new Date(b.pickupDate).toLocaleDateString()}</td>
            <td>${new Date(b.returnDate).toLocaleDateString()}</td>
            <td style="color:var(--gold)">$${b.totalAmount}</td>
            <td><span class="status-badge status-${b.status}">${b.status}</span></td>
            <td>
              ${b.status === 'Pending' ? `<button class="btn-approve" onclick="updateBooking(${b.id},'approve')">Approve</button><button class="btn-reject" onclick="updateBooking(${b.id},'reject')">Reject</button>` : ''}
              ${b.status === 'Active' ? `<button class="btn-complete" onclick="updateBooking(${b.id},'complete')">Complete</button>` : ''}
              ${b.status !== 'Pending' && b.status !== 'Active' ? '<span style="color:#333">—</span>' : ''}
            </td>
          </tr>`).join('');
            } catch (e) { showAlert('bookingsAlert', 'Failed to load bookings.'); }
        }

        async function updateBooking(id, action) {
            try {
                const res = await fetch(`${API}/bookings/${id}/${action}`, { method: 'PUT', headers: { Authorization: authHeader() } });
                if (res.ok) loadBookings();
                else showAlert('bookingsAlert', 'Action failed.');
            } catch (e) { showAlert('bookingsAlert', 'Connection error.'); }
        }

        async function loadCars() {
            try {
                const res = await fetch(`${API}/cars`, { headers: { Authorization: authHeader() } });
                const cars = await res.json();
                document.getElementById('carsTable').innerHTML = cars.map(c => `
          <tr>
            <td>${c.make}</td><td>${c.model}</td><td>${c.year}</td>
            <td>${c.category}</td><td style="color:var(--gold)">$${c.dailyRate}</td>
            <td>${c.licencePlate}</td>
            <td><span class="status-badge status-${c.status === 'Available' ? 'Approved' : c.status === 'Rented' ? 'Active' : 'Pending'}">${c.status}</span></td>
            <td>
              <button class="btn-edit" onclick="openCarModal(${JSON.stringify(c).replace(/"/g, '&quot;')})">Edit</button>
              <button class="btn-delete" onclick="deleteCar(${c.id})">Delete</button>
            </td>
          </tr>`).join('');
            } catch (e) { showAlert('carsAlert', 'Failed to load cars.'); }
        }

        function openCarModal(car = null) {
            editingCarId = car ? car.id : null;
            document.getElementById('carModalTitle').textContent = car ? 'Edit Car' : 'Add New Car';
            document.getElementById('carMake').value = car ? car.make : '';
            document.getElementById('carModel').value = car ? car.model : '';
            document.getElementById('carYear').value = car ? car.year : '';
            document.getElementById('carCategory').value = car ? car.category : '';
            document.getElementById('carRate').value = car ? car.dailyRate : '';
            document.getElementById('carPlate').value = car ? car.licencePlate : '';
            document.getElementById('carColour').value = car ? car.colour : '';
            document.getElementById('carModalAlert').innerHTML = '';
            document.getElementById('carModal').classList.remove('hidden');
        }

        function closeCarModal() { document.getElementById('carModal').classList.add('hidden'); }

        async function saveCar() {
            const dto = {
                make: document.getElementById('carMake').value.trim(),
                model: document.getElementById('carModel').value.trim(),
                year: parseInt(document.getElementById('carYear').value),
                category: document.getElementById('carCategory').value.trim(),
                dailyRate: parseFloat(document.getElementById('carRate').value),
                licencePlate: document.getElementById('carPlate').value.trim(),
                colour: document.getElementById('carColour').value.trim()
            };
            if (!dto.make || !dto.model || !dto.year || !dto.category || !dto.dailyRate || !dto.licencePlate || !dto.colour)
                return showAlert('carModalAlert', 'Please fill in all fields');
            try {
                const url = editingCarId ? `${API}/cars/${editingCarId}` : `${API}/cars`;
                const method = editingCarId ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers: { Authorization: authHeader(), 'Content-Type': 'application/json' }, body: JSON.stringify(dto) });
                if (res.ok) { closeCarModal(); loadCars(); }
                else showAlert('carModalAlert', 'Failed to save car.');
            } catch (e) { showAlert('carModalAlert', 'Connection error.'); }
        }

        async function deleteCar(id) {
            if (!confirm('Delete this car?')) return;
            try {
                const res = await fetch(`${API}/cars/${id}`, { method: 'DELETE', headers: { Authorization: authHeader() } });
                if (res.ok) loadCars();
                else showAlert('carsAlert', 'Failed to delete car.');
            } catch (e) { showAlert('carsAlert', 'Connection error.'); }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/users`, { headers: { Authorization: authHeader() } });
                const users = await res.json();
                document.getElementById('usersTable').innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td><td>${u.username}</td><td>${u.fullName}</td>
            <td><span class="status-badge status-${u.role === 'Admin' ? 'Active' : u.role === 'Staff' ? 'Approved' : 'Pending'}">${u.role}</span></td>
            <td>${u.email}</td><td>${u.phone}</td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
          </tr>`).join('');
            } catch (e) { console.log('Failed to load users'); }
        }

        function logout() {
            localStorage.removeItem('ent_user');
            localStorage.removeItem('ent_pass');
            currentRole = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginWrap').classList.remove('hidden');
        }
    </script>
</body>
</html>
